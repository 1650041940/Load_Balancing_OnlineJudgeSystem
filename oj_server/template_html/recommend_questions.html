<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online OJ - 为你推荐</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="navbar">
        <div class="inner">
            <div class="left">
                <a class="brand" href="/">Online OJ</a>
                <a href="/all_questions">题库</a>
                <a href="/recommend">为你推荐</a>
            </div>
            <div class="right">
                <span class="pill">用户：{{username}}</span>
                <a href="/login">登录</a>
                <a href="/register">注册</a>
                <a href="/logout">退出</a>
            </div>
        </div>
    </div>

    <div class="page">
        <div class="hero">
            <h1>为你推荐</h1>
            <p>基于“通过题目”的共现关系计算相似度；若历史不足则回退到热门题目。</p>
        </div>

        <div class="card" style="margin-top:14px;">
            <div class="hd">
                <h2>推荐列表</h2>
                <p>点击题目进入做题页。</p>
            </div>
            <div class="bd">
                <table class="table">
                    <tr>
                        <th style="width:90px;">编号</th>
                        <th>标题</th>
                        <th style="width:140px;">难度</th>
                        <th style="width:140px;">评分</th>
                    </tr>
                    {{#recommend_list}}
                    <tr>
                        <td>{{number}}</td>
                        <td><a href="/question/{{number}}">{{title}}</a></td>
                        <td>{{star}}</td>
                        <td>{{score}}</td>
                    </tr>
                    {{/recommend_list}}
                </table>
            </div>
        </div>
    </div>

    <div class="footer">© Online OJ Demo</div>

</body>

</html>
