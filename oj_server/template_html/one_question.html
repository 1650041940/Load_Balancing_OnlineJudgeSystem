<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{number}}.{{title}} - Online OJ</title>
    <!-- 引入ACE插件 -->
    <!-- 官网链接：https://ace.c9.io/ -->
    <!-- CDN链接：https://cdnjs.com/libraries/ace -->
    <!-- 使用介绍：https://www.iteye.com/blog/ybc77107-2296261 -->
    <!-- https://justcode.ikeepstudying.com/2016/05/ace-editor-%E5%9C%A8%E7%BA%BF%E4%BB%A3%E7%A0%81%E7%BC%96%E8%BE%91%E6%9E%81%E5%85%B6%E9%AB%98%E4%BA%AE/ -->
    <!-- 引入ACE CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.6/ace.js" type="text/javascript"
        charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.2.6/ext-language_tools.js" type="text/javascript"
        charset="utf-8"></script>
    <!-- 引入jquery CDN -->
    <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>

    <link rel="stylesheet" href="/style.css">
    <style>
        .split {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 1000px) {
            .split {
                grid-template-columns: 1fr 1fr;
            }
        }

        .desc {
            max-height: 640px;
            overflow: auto;
        }

        .desc h3 {
            margin: 0;
            font-size: 16px;
        }

        .desc pre {
            margin: 10px 0 0;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #334155;
            font-family: ui-sans-serif, system-ui;
            font-size: 14px;
        }

        .ace_editor {
            height: 640px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .resultbox {
            flex: 1;
            min-width: 320px;
        }

        .resultbox pre {
            margin: 8px 0 0;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0b1220;
            color: rgba(255, 255, 255, 0.9);
            overflow: auto;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="inner">
            <div class="left">
                <a class="brand" href="/">Online OJ</a>
                <a href="/all_questions">题库</a>
                <a href="/recommend">为你推荐</a>
            </div>
            <div class="right">
                <span class="pill">用户：{{username}}</span>
                <a href="/login">登录</a>
                <a href="/register">注册</a>
                <a href="/logout">退出</a>
            </div>
        </div>
    </div>

    <div class="page">
        <div class="split">
            <div class="card desc">
                <div class="hd">
                    <h2><span id="number">{{number}}</span>. {{title}}</h2>
                    <p>难度：{{star}} · 提交后采用异步队列评测</p>
                </div>
                <div class="bd">
                    <pre>{{desc}}</pre>
                </div>
            </div>
            <div>
                <pre id="code" class="ace_editor"><textarea class="ace_text-input">{{pre_code}}</textarea></pre>
            </div>
        </div>

        <div class="actions">
            <div class="resultbox card" style="flex: 1;">
                <div class="hd">
                    <h2>评测结果</h2>
                    <p>会显示任务状态与判定结果（AC/WA/CE/TLE 等）</p>
                </div>
                <div class="bd">
                    <div class="result"></div>
                </div>
            </div>
            <button class="btn primary" style="min-width: 140px;" onclick="submit()">提交评测</button>
        </div>
    </div>
    <script>
        //初始化对象
        editor = ace.edit("code");

        //设置风格和语言（更多风格和语言，请到github上相应目录查看）
        // 主题大全：http://www.manongjc.com/detail/25-cfpdrwkkivkikmk.html
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");

        // 字体大小
        editor.setFontSize(16);
        // 设置默认制表符的大小:
        editor.getSession().setTabSize(4);

        // 设置只读（true时只读，用于展示代码）
        editor.setReadOnly(false);

        // 启用提示菜单
        ace.require("ace/ext/language_tools");
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableSnippets: true,
            enableLiveAutocompletion: true
        });

        function submit() {
            var result_div = $(".result");
            result_div.empty();

            // 1. 收集当前页面的有关数据, 1. 题号 2.代码
            var code = editor.getSession().getValue();
            var number = $("#number").text();
            var judge_url = "/judge_async/" + number;

            result_div.append($("<div>", { class: "notice", text: "已提交，正在排队评测..." }));

            // 2. 异步提交任务，快速返回 task_id
            $.ajax({
                method: 'Post',
                url: judge_url,
                dataType: 'json',
                contentType: 'application/json;charset=utf-8',
                data: JSON.stringify({
                    'code': code,
                    'input': ''
                }),
                success: function (data) {
                    if (!data || !data.task_id) {
                        result_div.empty();
                        result_div.append($("<div>", { class: "notice err", text: "提交失败：未获取到任务ID" }));
                        return;
                    }
                    poll_task(data.task_id);
                },
                error: function () {
                    result_div.empty();
                    result_div.append($("<div>", { class: "notice err", text: "提交失败：网络错误" }));
                }
            });

            // 3. 轮询任务状态，直到 DONE/ERROR
            function poll_task(task_id) {
                $.ajax({
                    method: 'Get',
                    url: "/task/" + task_id,
                    dataType: 'json',
                    success: function (task) {
                        result_div.empty();
                        var state = task && task.state ? task.state : "UNKNOWN";
                        result_div.append($("<div>", { class: "notice", text: "任务ID: " + task_id + " | 状态: " + state }));

                        if (state === "DONE") {
                            show_result(task.result);
                            return;
                        }
                        if (state === "ERROR") {
                            result_div.append($("<div>", { class: "notice err", text: task.error ? task.error : "评测失败" }));
                            return;
                        }
                        setTimeout(function () { poll_task(task_id); }, 500);
                    },
                    error: function () {
                        result_div.empty();
                        result_div.append($("<div>", { class: "notice err", text: "查询失败：网络错误" }));
                    }
                });
            }

            // 4. 展示评测结果
            function show_result(data) {
                if (!data) {
                    result_div.append($("<div>", { class: "notice err", text: "结果为空" }));
                    return;
                }

                var _status = data.status;
                var _reason = data.reason;
                var _verdict = data.verdict ? data.verdict : "";

                if (_verdict) {
                    result_div.append($("<div>", { class: _verdict === "Accepted" ? "notice ok" : "notice err", text: "判定结果: " + _verdict }));
                }
                if (_reason) result_div.append($("<div>", { class: "notice", text: _reason }));

                if (_status === 0) {
                    var _stdout = data.stdout;
                    var _stderr = data.stderr;
                    if (_stdout) result_div.append($("<pre>", { text: _stdout }));
                    if (_stderr) result_div.append($("<pre>", { text: _stderr }));
                }
            }
        }
    </script>
</body>

</html>
